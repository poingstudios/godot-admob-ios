name: CI iOS PR

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  detect-latest:
    name: Check latest Godot version
    runs-on: ubuntu-latest
    outputs:
      godot_version: ${{ steps.detect.outputs.godot_version }}
    steps:
    - name: Detect latest Godot version
      id: detect
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        LATEST=$(gh api repos/godotengine/godot/releases \
          --jq '[.[] | select(.tag_name | test("^4\\.[0-9]+(\\.[0-9]+)?-stable$")) | .tag_name][0]' \
          | sed 's/-stable//')
          
        LATEST_PAD=$(echo "$LATEST" | awk -F. '{if(NF==2) print $0".0"; else print $0}')
        echo "godot_version=$LATEST_PAD" >> $GITHUB_OUTPUT

  build-and-artifact:
    name: Build & Upload Artifact
    needs: detect-latest
    runs-on: "macos-latest"
    permissions:
      pull-requests: write

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}

    - name: Load .scons_cache directory
      id: ios-template-cache
      uses: actions/cache@v5
      with:
        path: ${{github.workspace}}/godot/.scons_cache/
        key: ${{github.job}}-master-${{github.ref}}-${{github.sha}}
        restore-keys: |
          ${{github.job}}-master-${{github.ref}}-${{github.sha}}
          ${{github.job}}-master-${{github.ref}}
          ${{github.job}}-master

    - name: Set up Python 3.x
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
        architecture: 'x64'

    - name: Configuring Python packages
      run: |
        python -m pip install scons

    - name: Cache SPM dependencies
      uses: actions/cache@v5
      with:
        path: .build
        key: spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
        restore-keys: |
          spm-

    - name: Compiles the Source Code
      env:
        SCONS_CACHE: ${{github.workspace}}/godot/.scons_cache/
      run: |
        ./scripts/build.sh ${{ needs.detect-latest.outputs.godot_version }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      id: artifact-upload-step
      with:
        name: poing-godot-admob-ios-v${{ needs.detect-latest.outputs.godot_version }}-${{ github.event.pull_request.head.sha }}
        path: bin/release/*.zip
        retention-days: 14

    - name: Comment PR with Artifact Link
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const artifactUrl = '${{ steps.artifact-upload-step.outputs.artifact-url }}';
          const commitSha = '${{ github.event.pull_request.head.sha }}'.substring(0, 7);
          const body = `✅ **Build Successful!** (Commit: \`${commitSha}\`)\n\nThe plugin has been compiled for iOS (Godot ${ '${{ needs.detect-latest.outputs.godot_version }}' }).\n\n📦 [Download Artifact ZIP](${artifactUrl})`;
          
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          
          const botComment = comments.find(comment => 
            comment.user.type === 'Bot' && comment.body.includes('Download Artifact ZIP')
          );
          
          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: body
            });
          } else {
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          }
